<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feed The Turtle!</title>

<style>

@font-face {
    font-family: ComicCustom;
    src: url("comic-sans-ms.ttf");
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(#19c8ff,#003b8f);
    font-family:ComicCustom,"Comic Sans MS";
    color:white;
}


/* TITLE */

#title{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    font-size:55px;
    color:#ffeb3b;
    text-shadow:5px 5px black;
}


/* FOOD CARD */

#foodBox{
    position:absolute;
    top:120px;
    width:100%;
    text-align:center;
    z-index:20;
}

#food{
    width:220px;
    height:220px;
    object-fit:contain;
}

.flash{
    animation:flash .45s 6;
}

@keyframes flash{

0%{
opacity:1;
transform:scale(1);
}

50%{
opacity:0;
transform:scale(.6);
}

100%{
opacity:1;
transform:scale(1);
}

}


/* ANIMALS */

.character{
    position:absolute;
    bottom:25%;
    width:220px;
}

#shark{
    left:30px;
    transform:scaleX(-1);
}

#turtle{
    left:430px;
}


/* BUTTON */

#go{
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    
    font-size:60px;
    padding:15px 80px;

    border-radius:60px;
    border:5px solid white;

    background:#ffeb3b;
    font-family:inherit;
}


/* ROUND */

#round{
    position:absolute;
    top:30px;
    right:40px;
    font-size:40px;
}


/* END SCREEN */

#end{
    display:none;

    position:absolute;
    width:100%;
    height:100%;

    background:rgba(0,0,0,.8);

    justify-content:center;
    align-items:center;

    font-size:80px;
    color:#7cff00;

    z-index:50;
}

</style>

</head>


<body>


<div id="title">
Swim Turtle Swim!
</div>


<div id="round">
1 / 10
</div>


<div id="foodBox">
<img id="food">
</div>


<img 
id="shark" 
class="character" 
src="shark.gif">


<img 
id="turtle" 
class="character" 
src="turtle.gif">


<button id="go">
GO!
</button>


<div id="end">
SUCCESS!
</div>



<script>


let foods=[

{
name:"a hamburger",
img:"hamburger.png"
},

{
name:"a hot dog",
img:"hotdog.png"
},

{
name:"some ice cream",
img:"ice cream.png"
},

{
name:"some milk",
img:"milk.png"
},

{
name:"some water",
img:"water.png"
},

{
name:"some juice",
img:"juice.png"
}

];


let round=1;


let sharkX=30;
let turtleX=430;


let shark=document.getElementById("shark");
let turtle=document.getElementById("turtle");
let food=document.getElementById("food");

let go=document.getElementById("go");


// SHOW RANDOM FOOD

function newFood(){

let pick=
foods[
Math.floor(
Math.random()*foods.length
)
];

food.src=pick.img;


/* flash three times */

food.classList.remove("flash");

void food.offsetWidth;

food.classList.add("flash");


}



// MOVEMENT


function moveShark(){

sharkX+=0.7;

shark.style.left=
sharkX+"px";


let s=
shark.getBoundingClientRect();

let t=
turtle.getBoundingClientRect();


if(
s.right > t.left+60
){

sharkX=30;
turtleX=430;

}


requestAnimationFrame(moveShark);

}





go.onclick=function(){


turtleX+=80;

turtle.style.left=
turtleX+"px";



round++;



if(round>10){

document.getElementById("end")
.style.display="flex";

go.style.display="none";

return;

}


document.getElementById("round")
.innerHTML=
round+" / 10";


newFood();


};



newFood();

moveShark();


</script>


</body>
</html>
